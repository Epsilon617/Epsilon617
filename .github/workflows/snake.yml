name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate snake assets
        uses: Platane/snk@v3.4.1
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Publish to output branch
        shell: bash
        run: |
          set -euo pipefail

          deploy_dir="$(mktemp -d)"
          cleanup() {
            git worktree remove "$deploy_dir" --force >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git fetch origin output
            git worktree add -B output "$deploy_dir" origin/output
          else
            git worktree add --detach "$deploy_dir"
            git -C "$deploy_dir" checkout --orphan output
          fi

          find "$deploy_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -r dist/. "$deploy_dir"/
          touch "$deploy_dir/.nojekyll"

          git -C "$deploy_dir" add -A
          if git -C "$deploy_dir" diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git -C "$deploy_dir" commit -m "Update snake assets [skip ci]"
          git -C "$deploy_dir" push origin HEAD:output --force
